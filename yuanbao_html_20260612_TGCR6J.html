<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰中双语中文前后测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .system-container {
            max-width: 1500px;
            margin: 0 auto;
        }
        
        /* 主界面 */
        .main-interface {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .main-title {
            font-size: 3rem;
            font-weight: 800;
            color: #2d3e8a;
            margin-bottom: 20px;
        }
        
        .test-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .test-btn {
            padding: 18px 45px;
            font-size: 1.8rem;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-pre { background: linear-gradient(135deg, #4CAF50, #2E8B57); color: white; }
        .btn-post { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-teacher { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-export { background: linear-gradient(135deg, #17a2b8, #138496); color: white; }
        
        .test-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        /* 测试区域 */
        .test-section {
            display: none;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 25px 40px;
            color: white;
            text-align: center;
        }
        
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.5rem; opacity: 0.95; }
        
        .student-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .student-bar select {
            padding: 10px 20px;
            font-size: 1.4rem;
            border: 2px solid #667eea;
            border-radius: 10px;
            min-width: 280px;
        }
        
        .timer { font-size: 1.8rem; font-weight: 700; color: #f5576c; }
        
        .questions-section {
            padding: 20px 40px;
        }
        
        .question-card {
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .q-num {
            position: absolute;
            top: -12px;
            left: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 18px;
            border-radius: 15px;
            font-weight: 700;
        }
        
        .q-text { font-size: 1.8rem; margin-bottom: 15px; padding-top: 5px; }
        .q-chinese { color: #2d3e8a; font-weight: 600; }
        .q-thai { color: #856404; font-size: 1.5rem; margin-top: 5px; }
        
        .option {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        
        .option:hover { background: #e9ecef; }
        .option.selected { background: #e7f1ff; border-color: #667eea; }
        .option.correct { background: #d4edda; border-color: #28a745; }
        .option.incorrect { background: #f8d7da; border-color: #dc3545; }
        
        .option-letter {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .button-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 40px;
            background: #f8f9fa;
            border-top: 2px solid #dee2e6;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            font-size: 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .btn-submit { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
        .btn-reset { background: linear-gradient(135deg, #ffc107, #fd7e14); color: white; }
        .btn-back { background: linear-gradient(135deg, #6c757d, #495057); color: white; }
        
        /* 结果面板 */
        .result-panel {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        
        .result-modal {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 80%;
            max-width: 550px;
            text-align: center;
        }
        
        .result-modal h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .score-big { font-size: 4rem; font-weight: 800; color: #667eea; margin: 15px 0; }
        .score-msg { font-size: 1.8rem; color: #555; margin-bottom: 25px; }
        
        /* 老师面板 */
        .teacher-panel {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 998;
            justify-content: center;
            align-items: center;
        }
        
        .teacher-modal {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 92%;
            max-width: 1300px;
            max-height: 88vh;
            overflow-y: auto;
        }
        
        .teacher-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .teacher-header h2 { font-size: 2.2rem; }
        .close-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.4rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 1.3rem;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f5f5f5; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .stat-box {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box .num { font-size: 2rem; font-weight: 800; }
        .stat-box .label { font-size: 1.1rem; color: #666; }
        
        .bg-gray { background: #e9ecef; }
        .bg-green { background: #d4edda; }
        .bg-blue { background: #cce5ff; }
        .bg-yellow { background: #fff3cd; }
        
        @media (max-width: 900px) {
            .test-buttons { flex-direction: column; align-items: center; }
            .test-btn { width: 100%; max-width: 320px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .student-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="system-container">

<!-- 主界面 -->
<div class="main-interface" id="mainPage">
    <h1 class="main-title">📊 泰中双语中文前后测系统</h1>
    <p style="font-size:1.6rem; color:#495057; margin-bottom:10px;">语法：越来越 + 形容词 + 心理动词</p>
    <p style="font-size:1.4rem; color:#28a745; font-weight:600; margin-bottom:20px;">
        💾 成绩自动保存在本机，关闭页面也不会丢失
    </p>
    <div class="test-buttons">
        <button class="test-btn btn-pre" onclick="startTest('pre')">📋 课前测试</button>
        <button class="test-btn btn-post" onclick="startTest('post')">📈 课后测试</button>
        <button class="test-btn btn-teacher" onclick="showTeacher()">👨‍🏫 查看成绩</button>
        <button class="test-btn btn-export" onclick="exportData()">📥 导出成绩</button>
    </div>
</div>

<!-- 课前测试 -->
<div class="test-section" id="preSection">
    <div class="header">
        <h1>📋 课前测试</h1>
        <p>语法：越来越 + 形容词 + 心理动词（共15题）</p>
    </div>
    <div class="student-bar">
        <div>
            <label style="font-size:1.5rem; font-weight:600;">👤 选择学生：</label>
            <select id="preStudent"></select>
        </div>
        <div class="timer" id="preTimer">⏱️ 00:00</div>
    </div>
    <div class="questions-section" id="preQuestions"></div>
    <div class="button-area">
        <button class="btn btn-submit" onclick="submitTest('pre')">✅ 提交答案</button>
        <button class="btn btn-reset" onclick="resetTest('pre')">🔄 重新作答</button>
        <button class="btn btn-back" onclick="goHome()">🏠 返回主菜单</button>
    </div>
</div>

<!-- 课后测试 -->
<div class="test-section" id="postSection">
    <div class="header">
        <h1>📈 课后测试</h1>
        <p>语法：越来越 + 形容词 + 心理动词（共15题）</p>
    </div>
    <div class="student-bar">
        <div>
            <label style="font-size:1.5rem; font-weight:600;">👤 选择学生：</label>
            <select id="postStudent"></select>
        </div>
        <div class="timer" id="postTimer">⏱️ 00:00</div>
    </div>
    <div class="questions-section" id="postQuestions"></div>
    <div class="button-area">
        <button class="btn btn-submit" onclick="submitTest('post')">✅ 提交答案</button>
        <button class="btn btn-reset" onclick="resetTest('post')">🔄 重新作答</button>
        <button class="btn btn-back" onclick="goHome()">🏠 返回主菜单</button>
    </div>
</div>

</div>

<!-- 结果弹窗 -->
<div class="result-panel" id="resultPanel">
    <div class="result-modal">
        <h2 id="resultTitle">🎉 测试完成！</h2>
        <div class="score-big" id="resultScore">0/15</div>
        <div class="score-msg" id="resultMsg"></div>
        <button class="btn btn-submit" onclick="document.getElementById('resultPanel').style.display='none'; showTeacher();">
            👁️ 查看成绩
        </button>
    </div>
</div>

<!-- 老师面板 -->
<div class="teacher-panel" id="teacherPanel">
    <div class="teacher-modal">
        <div class="teacher-header">
            <h2>👨‍🏫 成绩对比分析</h2>
            <button class="close-btn" onclick="document.getElementById('teacherPanel').style.display='none'">关闭</button>
        </div>
        <div id="teacherStats"></div>
        <div id="teacherTable"></div>
    </div>
</div>

<script>
// ============ 学生名单 ============
const students = [
    ["นายญาณวรุตม์  พงษ์พันธ์","洪荩"],["นายธราเทพ  พิมพ์คาม","陈战"],
    ["นางสาวณัฏฐธิดา  สังฆกุล","钟宝辰"],["นางสาวภัทรดา  เกี้ยวสันเทียะ","赵宁安"],
    ["นางสาวกมลชนก  สุขศิริวณิชชา","江念真"],["นางสาวธิติมา  นนท์นาม","肖淑花"],
    ["นางสาวณัฏฐา  เพ็ชรสูงเนิน","金丽平"],["นางสาวสุภัสสรา  เปล่งสันเทียะ","李婷婷"],
    ["นางสาวธัญชนก  มุดทะเล","林苞"],["นางสาวนารีรักษ์  มณีเนตร","洪欣妍"],
    ["นางสาวพิมพกานต์  รื่นเริงใจ","白丽诸"],["นางสาวพิมพร  สารเจริญโภคา","李宁天"],
    ["นางสาวพิมพ์รดา  สินทะรมย์","赵美琳"],["นางสาวจุฬารัตน์  เรศสันเทียะ","林欣妍"],
    ["นายสิรวิชญ์  อามาตย์พล","张伟"],["นายวงศธร  เหลืองงาม","卫知"],
    ["นายรัฐพงษ์  จิตพิลัย","朱梓宣"],["นางสาวพรรณกาญจน์  กล้าถูก","赵金月"],
    ["นางสาวอรสา  หวังแต้มกลาง","容飞仙"],["นางสาวณัชชา  เพ็ชรสูงเนิน","金欣怡"],
    ["นางสาวณัฐหทัย  บงเเก้ว","任月欣"],["นางสาวบุณรดา  เทพบุตร","王梅丽"],
    ["นางสาวอภิญญา  หมื่นฤทธิ์","张芳欣"],["นางสาวสิรินกานต์  ทิพย์สมบัติ","白月赐"],
    ["นางสาวปภาวี  อ้นศิริ","王淑力"],["นางสาวมัณฑณี  การบรรจง","林宁丽"],
    ["นางสาวภัทรวดี  เยี่ยมไธสง","若飞珍"],["นางสาวมิ่งขวัญ  ไว้สันเทียะ","刘宝贝"],
    ["นางสาววณิษราพร  แซ่ลาย","李淑魅"],["นางสาวอสมาภรณ์  ลอดกระโทก","玉石任"]
];

// ============ 题目 ============
const questions = [
    {c:"1. 我最近越来越胖了。",t:"มีความหมายตรงกับข้อใด",o:[["A","ช่วงนี้ฉันผอมลงเรื่อยๆ",false],["B","ช่วงนี้ฉันสวยขึ้นเรื่อยๆ",false],["C","ช่วงนี้ฉันอ้วนขึ้นเรื่อยๆ",true]]},
    {c:"2. 今年的考试越来越容易。",t:"มีความหมายตรงกับข้อใด",o:[["A","ข้อสอบของปีนี้ง่ายขึ้นเรื่อยๆ",true],["B","ข้อสอบของปีนี้ยากขึ้นเรื่อยๆ",false],["C","ข้อสอบของปีหน้ายากขึ้นเรื่อยๆ",false]]},
    {c:"3. 妈妈最近越来越喜欢运动。",t:"มีความหมายตรงกับข้อใด",o:[["A","ช่วงนี้แม่ชอบทำอาหารขึ้นเรื่อยๆ",false],["B","ช่วงนี้แม่ชอบออกกำลังกายขึ้นเรื่อยๆ",true],["C","ช่วงนี้แม่ชอบดูทีวีขึ้นเรื่อยๆ",false]]},
    {c:"4. 弟弟最近越来越瘦了。",t:"มีความหมายตรงกับข้อใด",o:[["A","ช่วงนี้น้องชายอ้วนขึ้นเรื่อยๆ",false],["B","ช่วงนี้น้องชายเก่งขึ้นเรื่อยๆ",false],["C","ช่วงนี้น้องชายผอมลงเรื่อยๆ",true]]},
    {c:"5. 他的汉语越来越好了。",t:"มีความหมายตรงกับข้อใด",o:[["A","ภาษาไทยของเขาดีขึ้นเรื่อยๆ",false],["B","ภาษาอังกฤษของเขาดีขึ้นเรื่อยๆ",false],["C","ภาษาจีนของเขาดีขึ้นเรื่อยๆ",true]]},
    {c:"6. 越来越 / 好吃 / 你 / 做的饭 / 了",t:"เรียงประโยคต่อไปนี้ให้ถูกต้อง",o:[["A","你做的饭越来越好吃了。",true],["B","你越来越做的饭好吃了。",false],["C","你做的越来越饭好吃了。",false]]},
    {c:"7. 爸爸的 / 越来越 / 身体 /了/ 健康",t:"เรียงประโยคต่อไปนี้ให้ถูกต้อง",o:[["A","爸爸越来越身体健康了。",false],["B","爸爸的身体越来越健康了。",true],["C","爸爸的越来越身体健康了。",false]]},
    {c:"8. 北京 /了/ 冬天 / 越来越 / 的 / 冷",t:"เรียงประโยคต่อไปนี้ให้ถูกต้อง",o:[["A","北京冬天的越来越冷了。",false],["B","北京的冬天冷越来越了。",false],["C","北京的冬天越来越冷了。",true]]},
    {c:"9. 了/ 现在 / 我妹妹 / 漂亮 / 越来越",t:"เรียงประโยคต่อไปนี้ให้ถูกต้อง",o:[["A","现在我妹妹越来越漂亮了。",true],["B","现在我的妹妹漂亮越来越了。",false],["C","我现在越来越妹妹漂亮了。",false]]},
    {c:"10. 秋天 / 越来越 / 的 / 冷 / 天气 / 了",t:"เรียงประโยคต่อไปนี้ให้ถูกต้อง",o:[["A","秋天的天气越来越冷了。",true],["B","秋天天气的越来越冷了。",false],["C","秋天的越来越天气冷了。",false]]},
    {c:"11. 女的最近怎么样？",t:"ฟังแล้วตอบคำถาม",o:[["A","越来越漂亮",false],["B","越来越胖",true],["C","越来越好",false]]},
    {c:"12. 最近北京的天气怎么样？",t:"ฟังแล้วตอบคำถาม",o:[["A","越来越冷",true],["B","越来越热",false],["C","越来越好吃",false]]},
    {c:"13. 女的做菜做得怎么样？",t:"ฟังแล้วตอบคำถาม",o:[["A","越来越好看",false],["B","越来越好",false],["C","越来越好吃",true]]},
    {c:"14. 女的妈妈现在越来越喜欢什么？",t:"ฟังแล้วตอบคำถาม",o:[["A","越来越喜欢运动",true],["B","越来越喜欢跑步",false],["C","越来越喜欢每天做饭",false]]},
    {c:"15. 女的最近喜欢什么季节？",t:"ฟังแล้วตอบคำถาม",o:[["A","越来越喜欢冬天",false],["B","越来越喜欢春天",false],["C","越来越喜欢夏天",true]]}
];

// ============ 数据存储 ============
let preAns = {}, postAns = {}, preScore = {}, postScore = {};
let curStudent = null, curType = null, timer = null, startTime = null;

// 从本地存储读取
function loadData() {
    try {
        if(localStorage.getItem('preAns')) preAns = JSON.parse(localStorage.getItem('preAns'));
        if(localStorage.getItem('postAns')) postAns = JSON.parse(localStorage.getItem('postAns'));
        if(localStorage.getItem('preScore')) preScore = JSON.parse(localStorage.getItem('preScore'));
        if(localStorage.getItem('postScore')) postScore = JSON.parse(localStorage.getItem('postScore'));
    } catch(e) {}
}

// 保存到本地存储
function saveData() {
    try {
        localStorage.setItem('preAns', JSON.stringify(preAns));
        localStorage.setItem('postAns', JSON.stringify(postAns));
        localStorage.setItem('preScore', JSON.stringify(preScore));
        localStorage.setItem('postScore', JSON.stringify(postScore));
    } catch(e) {}
}

// ============ 初始化 ============
function init() {
    loadData();
    
    // 填充下拉菜单
    ['preStudent','postStudent'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">-- 请选择 --</option>';
        students.forEach((s,i) => {
            sel.innerHTML += `<option value="${i}">${i+1}. ${s[1]} (${s[0]})</option>`;
        });
        sel.onchange = function() {
            if(this.value !== '') selectStudent(parseInt(this.value), id === 'preStudent' ? 'pre' : 'post');
        };
    });
    
    // 生成题目
    ['pre','post'].forEach(t => renderQuestions(t));
}

// 渲染题目
function renderQuestions(type) {
    const container = document.getElementById(type + 'Questions');
    container.innerHTML = '';
    questions.forEach((q, idx) => {
        let html = `<div class="question-card" id="q${type}${idx}">
            <div class="q-num">${idx+1}</div>
            <div class="q-text">
                <div class="q-chinese">${q.c}</div>
                <div class="q-thai">${q.t}</div>
            </div>
            <div class="options-container">`;
        q.o.forEach(o => {
            html += `<div class="option" onclick="selectOpt('${type}',${idx},'${o[0]}')" data-q="${idx}" data-opt="${o[0]}">
                <div class="option-letter">${o[0]}</div>
                <div>${o[1]}</div>
            </div>`;
        });
        html += `</div></div>`;
        container.innerHTML += html;
    });
}

// ============ 选择学生 ============
function selectStudent(idx, type) {
    if(curStudent !== null) saveCurAns();
    curStudent = idx;
    curType = type;
    document.getElementById(type+'Student').value = idx;
    
    // 加载学生答案
    const ans = type === 'pre' ? preAns[idx] : postAns[idx];
    const score = type === 'pre' ? preScore[idx] : postScore[idx];
    
    // 重置所有选项样式
    document.querySelectorAll(`#${type}Questions .option`).forEach(el => {
        el.className = 'option';
    });
    
    // 恢复选中状态
    if(ans) {
        Object.keys(ans).forEach(qIdx => {
            const opt = ans[qIdx];
            const el = document.querySelector(`#${type}Questions .option[data-q="${qIdx}"][data-opt="${opt}"]`);
            if(el) el.classList.add('selected');
        });
    }
    
    // 如果已评分，显示对错
    if(score !== undefined) showResults(type);
    
    // 启动计时器
    startTimer(type);
}

// 保存当前答案
function saveCurAns() {
    if(curStudent === null) return;
    const ans = {};
    document.querySelectorAll(`#${curType}Questions .option.selected`).forEach(el => {
        ans[el.dataset.q] = el.dataset.opt;
    });
    if(curType === 'pre') preAns[curStudent] = ans;
    else postAns[curStudent] = ans;
    saveData();
}

// ============ 选择选项 ============
function selectOpt(type, qIdx, optId) {
    const score = type === 'pre' ? preScore[curStudent] : postScore[curStudent];
    if(score !== undefined) return; // 已评分不能修改
    
    document.querySelectorAll(`#${type}Questions .option[data-q="${qIdx}"]`).forEach(el => {
        el.classList.remove('selected');
        if(el.dataset.opt === optId) el.classList.add('selected');
    });
}

// ============ 提交答案 ============
function submitTest(type) {
    if(curStudent === null) { alert('请先选择学生！'); return; }
    
    saveCurAns();
    const ans = type === 'pre' ? preAns[curStudent] : postAns[curStudent];
    if(!ans || Object.keys(ans).length === 0) { alert('请先作答！'); return; }
    
    // 计算分数
    let score = 0;
    Object.keys(ans).forEach(qIdx => {
        const optId = ans[qIdx];
        const correct = questions[parseInt(qIdx)].o.find(o => o[0] === optId)[2];
        if(correct) score++;
    });
    
    if(type === 'pre') preScore[curStudent] = score;
    else postScore[curStudent] = score;
    saveData();
    
    showResults(type);
    stopTimer();
    
    // 显示结果弹窗
    document.getElementById('resultTitle').textContent = type === 'pre' ? '🎉 课前测试完成！' : '🎉 课后测试完成！';
    document.getElementById('resultScore').textContent = `${score}/15`;
    const msgs = ['需要更多练习，请认真复习语法点。📚','还不错！继续努力，会越来越好！💪','做得很好！你对语法掌握得很好！👍','太棒了！满分！你掌握得非常出色！🎉'];
    const idx = score >= 15 ? 3 : score >= 12 ? 2 : score >= 9 ? 1 : 0;
    document.getElementById('resultMsg').textContent = msgs[idx];
    document.getElementById('resultPanel').style.display = 'flex';
}

// 显示结果（对错标记）
function showResults(type) {
    const ans = type === 'pre' ? preAns[curStudent] : postAns[curStudent];
    const score = type === 'pre' ? preScore[curStudent] : postScore[curStudent];
    if(score === undefined) return;
    
    questions.forEach((q, idx) => {
        const selected = ans ? ans[idx] : null;
        q.o.forEach(o => {
            const el = document.querySelector(`#${type}Questions .option[data-q="${idx}"][data-opt="${o[0]}"]`);
            if(!el) return;
            el.classList.remove('selected','correct','incorrect');
            if(o[2]) el.classList.add('correct');
            else if(selected === o[0]) el.classList.add('incorrect');
        });
    });
}

// ============ 重置 ============
function resetTest(type) {
    if(curStudent === null) return;
    if(type === 'pre') { delete preAns[curStudent]; delete preScore[curStudent]; }
    else { delete postAns[curStudent]; delete postScore[curStudent]; }
    saveData();
    
    document.querySelectorAll(`#${type}Questions .option`).forEach(el => {
        el.className = 'option';
    });
    startTimer(type);
}

// ============ 计时器 ============
function startTimer(type) {
    stopTimer();
    startTime = Date.now();
    timer = setInterval(() => {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(sec/60)).padStart(2,'0');
        const s = String(sec%60).padStart(2,'0');
        document.getElementById(type+'Timer').textContent = `⏱️ ${m}:${s}`;
    }, 1000);
}

function stopTimer() { if(timer) { clearInterval(timer); timer = null; } }

// ============ 页面切换 ============
function startTest(type) {
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('preSection').style.display = type === 'pre' ? 'block' : 'none';
    document.getElementById('postSection').style.display = type === 'post' ? 'block' : 'none';
}

function goHome() {
    stopTimer();
    document.getElementById('mainPage').style.display = 'block';
    document.getElementById('preSection').style.display = 'none';
    document.getElementById('postSection').style.display = 'none';
    document.getElementById('resultPanel').style.display = 'none';
}

// ============ 查看成绩 ============
function showTeacher() {
    document.getElementById('resultPanel').style.display = 'none';
    const preCnt = Object.keys(preScore).length;
    const postCnt = Object.keys(postScore).length;
    
    let statsHtml = `<div class="stats-grid">
        <div class="stat-box bg-gray"><div class="num">${students.length}</div><div class="label">总人数</div></div>
        <div class="stat-box bg-green"><div class="num">${preCnt}</div><div class="label">课前完成</div></div>
        <div class="stat-box bg-blue"><div class="num">${postCnt}</div><div class="label">课后完成</div></div>`;
    
    const preArr = Object.values(preScore);
    const postArr = Object.values(postScore);
    const preAvg = preArr.length ? (preArr.reduce((a,b)=>a+b,0)/preArr.length).toFixed(1) : 0;
    const postAvg = postArr.length ? (postArr.reduce((a,b)=>a+b,0)/postArr.length).toFixed(1) : 0;
    const prog = (postAvg - preAvg).toFixed(1);
    
    statsHtml += `<div class="stat-box bg-yellow"><div class="num">${prog}分</div><div class="label">平均进步</div></div></div>`;
    
    if(preCnt > 0 || postCnt > 0) {
        statsHtml += `<div style="background:#d4edda;padding:10px;border-radius:8px;margin-bottom:12px;text-align:center;font-size:1.4rem;">
            课前均分 ${preAvg} → 课后均分 ${postAvg}，平均进步 ${prog} 分
        </div>`;
    }
    
    document.getElementById('teacherStats').innerHTML = statsHtml;
    
    // 生成表格
    let rows = [];
    students.forEach((s, i) => {
        const pre = preScore[i] || 0;
        const post = postScore[i] || 0;
        rows.push({idx:i+1, thai:s[0], chinese:s[1], pre, post, prog:post-pre});
    });
    rows.sort((a,b) => b.post - a.post || b.prog - a.prog || a.idx - b.idx);
    
    let table = `<table><thead><tr>
        <th>排名</th><th>泰文姓名</th><th>中文姓名</th><th>学号</th>
        <th>课前成绩</th><th>课后成绩</th><th>进步</th>
    </tr></thead><tbody>`;
    
    rows.forEach((r, rank) => {
        const pc = r.pre >= 12 ? '#28a745' : r.pre >= 9 ? '#ffc107' : '#dc3545';
        const poc = r.post >= 12 ? '#28a745' : r.post >= 9 ? '#ffc107' : '#dc3545';
        const prc = r.prog > 0 ? '#28a745' : r.prog < 0 ? '#dc3545' : '#6c757d';
        table += `<tr>
            <td>${rank+1}</td>
            <td>${r.thai}</td>
            <td><strong>${r.chinese}</strong></td>
            <td>${r.idx}</td>
            <td style="font-weight:700;color:${pc}">${r.pre}/15</td>
            <td style="font-weight:700;color:${poc}">${r.post}/15</td>
            <td style="font-weight:700;color:${prc}">${r.prog > 0 ? '+' : ''}${r.prog}分</td>
        </tr>`;
    });
    
    table += '</tbody></table>';
    document.getElementById('teacherTable').innerHTML = table;
    document.getElementById('teacherPanel').style.display = 'flex';
}

// ============ 导出数据 ============
function exportData() {
    let csv = '\uFEFF排名,学号,泰文姓名,中文姓名,课前成绩,课后成绩,进步分数\n';
    let rows = [];
    students.forEach((s, i) => {
        const pre = preScore[i] || 0;
        const post = postScore[i] || 0;
        rows.push({idx:i+1, thai:s[0], chinese:s[1], pre, post, prog:post-pre});
    });
    rows.sort((a,b) => b.post - a.post || b.prog - a.prog || a.idx - b.idx);
    rows.forEach(r => {
        csv += `${rows.indexOf(r)+1},${r.idx},"${r.thai}","${r.chinese}",${r.pre},${r.post},${r.prog}\n`;
    });
    
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `前后测成绩_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
    a.click();
}

// 启动
init();
</script>
